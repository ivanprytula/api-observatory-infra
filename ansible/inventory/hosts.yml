---
# Static inventory for api-observatory.
# Replace IP addresses / hostnames with real values before use.
# For dynamic inventory: use azure.azcollection.azure_rm or aws_ec2 plugin.

all:
  children:

    # Local development — runs Ansible against the current machine
    dev:
      hosts:
        localhost:
          ansible_connection: local

    # ─── Azure ─────────────────────────────────────────────────────────
    azure_dev:
      hosts:
        api-observatory-vm:
          ansible_host: '<VM_PUBLIC_IP>'
          ansible_user: 'azureuser'
          ansible_ssh_private_key_file: '~/.ssh/id_rsa'
          cloud_provider: azure

    # ─── AWS ───────────────────────────────────────────────────────────
    aws_dev:
      hosts:
        api-observatory-ec2:
          ansible_host: '<EC2_PUBLIC_IP>'
          ansible_user: 'ubuntu'
          ansible_ssh_private_key_file: '~/.ssh/api-observatory-key.pem'
          cloud_provider: aws

    # Production environment (add hosts here before going live)
    production:
      hosts: {}
