---
# Validates that secrets have been properly set before deploying.
# This role does NOT write plaintext secrets to disk — it only checks
# that vault_ variables have been replaced from their CHANGEME defaults.

- name: 'Assert vault_db_password is configured'
  ansible.builtin.assert:
    fail_msg: 'vault_db_password is still set to CHANGEME. Update and re-encrypt vault.yml.'
    quiet: true
    that:
      - 'vault_db_password is defined'
      - 'vault_db_password != secrets_changeme_pattern'

- name: 'Assert vault_jwt_secret is configured'
  ansible.builtin.assert:
    fail_msg: 'vault_jwt_secret is still set to CHANGEME. Update and re-encrypt vault.yml.'
    quiet: true
    that:
      - 'vault_jwt_secret is defined'
      - 'vault_jwt_secret != secrets_changeme_pattern'
      - 'vault_jwt_secret | length >= 32'

- name: 'Assert vault_api_v1_bearer_token is configured'
  ansible.builtin.assert:
    fail_msg: 'vault_api_v1_bearer_token is still set to CHANGEME. Update and re-encrypt vault.yml.'
    quiet: true
    that:
      - 'vault_api_v1_bearer_token is defined'
      - 'vault_api_v1_bearer_token != secrets_changeme_pattern'

- name: 'Assert vault_docs_password is configured'
  ansible.builtin.assert:
    fail_msg: 'vault_docs_password is still set to CHANGEME. Update and re-encrypt vault.yml.'
    quiet: true
    that:
      - 'vault_docs_password is defined'
      - 'vault_docs_password != secrets_changeme_pattern'

- name: 'Check that .env does not contain CHANGEME values on the target host'
  ansible.builtin.command:
    argv:
      - 'grep'
      - '-c'
      - '{{ secrets_changeme_pattern }}'
      - '{{ app_dir }}/.env'
  become: true
  changed_when: false
  failed_when: '_env_changeme_check.rc == 0'
  ignore_errors: false
  register: _env_changeme_check
  # grep exits 1 when no lines match — that is the success case here
