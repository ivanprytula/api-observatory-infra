---
# Base OS bootstrap — packages, Docker, users, sysctl.
# Run this BEFORE app deployment on a fresh VM.
#
# Usage:
#   ansible-playbook playbooks/local-dev.yml -i inventory/hosts.yml \
#     --limit dev --ask-become-pass

- name: 'Base OS packages for api-observatory'
  hosts: all
  gather_facts: true

  roles:
    - role: 'common'
    - role: 'docker'
