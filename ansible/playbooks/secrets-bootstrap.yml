---
# Secrets bootstrap: validates vault variables are set and .env is properly rendered.
# Run this before bootstrap.yml to catch misconfigured secrets early.
#
# Usage:
#   ansible-playbook playbooks/secrets-bootstrap.yml -i inventory/hosts.yml \
#     --ask-vault-pass --limit dev

- name: 'Secrets bootstrap — api-observatory'
  hosts: all
  gather_facts: false

  roles:
    - role: 'secrets'
