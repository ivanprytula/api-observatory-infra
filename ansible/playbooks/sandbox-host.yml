---
# Configure a host as a sandbox target (Docker + monitoring).
#
# Usage:
#   ansible-playbook playbooks/sandbox-host.yml -i inventory/hosts.yml \
#     --limit dev --ask-become-pass
#
# After this playbook:
#   - Docker is installed and running
#   - node_exporter is running for host metrics
#   - sysctl tuned for Redis/Redpanda compatibility

- name: 'Configure sandbox host'
  hosts: all
  gather_facts: true

  roles:
    - role: 'common'
    - role: 'docker'
    - role: 'monitoring'
