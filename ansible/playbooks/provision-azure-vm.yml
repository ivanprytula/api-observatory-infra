---
# Provision and configure the Azure VM for API Observatory deployment.
# Assumes the VM already exists (created by infra/scripts/azure-provision.sh or Terraform).
#
# Usage:
#   ansible-playbook playbooks/provision-azure-vm.yml -i inventory/hosts.yml \
#     --limit azure_dev --ask-become-pass

- name: 'Provision Azure VM for api-observatory'
  hosts: azure_dev
  gather_facts: true
  become: true

  roles:
    - common
    - docker
    - app
    - monitoring
