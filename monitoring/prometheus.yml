global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local
    project: data-zoo

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── Ingestor (FastAPI + prometheus-fastapi-instrumentator) ─────────────────
  - job_name: ingestor
    static_configs:
      - targets: ['ingestor:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ingestor

  # ── Analytics ─────────────────────────────────────────────────────────────────────────
  - job_name: analytics
    static_configs:
      - targets: ['analytics:8005']
    metrics_path: /metrics
    scrape_interval: 10s

  # ── Inference ───────────────────────────────────────────────────────────────────────
  - job_name: inference
    static_configs:
      - targets: ['inference:8001']
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Dashboard ───────────────────────────────────────────────────────────────
  - job_name: dashboard
    static_configs:
      - targets: ['dashboard:8003']
    metrics_path: /metrics
    scrape_interval: 30s

  # ── Cache (cache_exporter — optional, add if you spin it up) ────────────────
  # - job_name: cache
  #   static_configs:
  #     - targets: ['cache-exporter:9121']

  # ── PostgreSQL (postgres_exporter — optional) ───────────────────────────────
  # - job_name: postgres
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # ── Redpanda (Prometheus endpoint built-in) ─────────────────────────────────
  - job_name: broker
    static_configs:
      - targets: ['broker:9644']
    metrics_path: /metrics
    scrape_interval: 15s
