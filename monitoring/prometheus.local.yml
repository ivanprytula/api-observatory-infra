global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local
    project: data-zoo

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: ingestor
    static_configs:
      - targets: ['ingestor:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ingestor

  - job_name: dashboard
    static_configs:
      - targets: ['dashboard:8003']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: broker
    static_configs:
      - targets: ['broker:9644']
    metrics_path: /metrics
    scrape_interval: 15s
