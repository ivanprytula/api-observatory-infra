name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"

      - name: Validate all environments
        run: |
          for dir in terraform/environments/*/; do
            echo "::group::Validating ${dir}"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
            echo "::endgroup::"
          done

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint plugins
        run: tflint --init --config .tflint.hcl

      - name: Run TFLint (all environments)
        run: |
          for dir in terraform/environments/*/; do
            echo "::group::Linting ${dir}"
            tflint --config "$(pwd)/.tflint.hcl" --chdir "$dir"
            echo "::endgroup::"
          done

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          quiet: true
          compact: true
          # Skip list MUST stay in sync with .pre-commit-config.yaml and the
          # justifications in TERRAFORM_CHECKS.md (each ID = one documented row).
          # Terraform-only subset (CI scans terraform/; K8s/SECRET skips omitted).
          skip_check: CKV2_AWS_5,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_30,CKV2_AWS_41,CKV_AWS_130,CKV_AWS_157,CKV_AZURE_43,CKV_AZURE_50,CKV_AZURE_119,CKV_AZURE_206,CKV2_AZURE_1,CKV2_AZURE_21,CKV2_AZURE_31,CKV2_AZURE_33,CKV2_AZURE_40,CKV2_AZURE_41,CKV2_AZURE_57

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v5
        with:
          version: "v3.17.0"

      - name: Lint all charts
        run: |
          for chart in kubernetes/charts/*/; do
            echo "::group::Linting ${chart}"
            helm lint "$chart"
            echo "::endgroup::"
          done

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run ShellCheck
        run: shellcheck --severity=warning scripts/*.sh
