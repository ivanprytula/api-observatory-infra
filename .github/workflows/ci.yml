name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Validate all environments
        run: |
          for dir in terraform/environments/*/; do
            echo "::group::Validating ${dir}"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
            echo "::endgroup::"
          done

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint plugins
        run: tflint --init --config .tflint.hcl

      - name: Run TFLint (all environments)
        run: |
          for dir in terraform/environments/*/; do
            echo "::group::Linting ${dir}"
            tflint --config "$(pwd)/.tflint.hcl" --chdir "$dir"
            echo "::endgroup::"
          done

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          quiet: true
          compact: true
          soft_fail: true
          # CKV2_AZURE_57 skipped: VNet integration (delegated subnet) is the
          # recommended approach for PostgreSQL Flexible Server, not private endpoint.
          # CKV_AZURE_43 skipped: storage account name uses replace() with a
          # variable — cannot be statically validated by Checkov.
          # CKV_AZURE_50 skipped: no VM extensions installed (false positive).
          # CKV_AZURE_206 skipped: LRS replication is correct for sandbox/emulator.
          # CKV_AWS_130 skipped: public subnets are intentional for dev.
          # CKV_AWS_157 skipped: Multi-AZ is a cost decision for dev.
          skip_check: CKV_TF_1, CKV2_AZURE_57, CKV_AZURE_43, CKV_AZURE_50, CKV_AZURE_206, CKV_AWS_130, CKV_AWS_157

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - name: Lint all charts
        run: |
          for chart in kubernetes/charts/*/; do
            echo "::group::Linting ${chart}"
            helm lint "$chart"
            echo "::endgroup::"
          done

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck --severity=warning scripts/*.sh
