version: 2

# IMPORTANT:
# Dependabot reads this config from the repository default branch.
# Keep this file in sync on the default branch to ensure target-branch rules apply.

updates:
  # Python package updates (uv — pyproject.toml + uv.lock)
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: monthly
    target-branch: main
    open-pull-requests-limit: 3
    reviewers:
      - ivanprytula
    assignees:
      - ivanprytula
    labels:
      - dependencies
    allow:
      - dependency-type: "direct"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    versioning-strategy: auto
    groups:
      uv-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Terraform provider updates (required_providers version constraints)
  - package-ecosystem: terraform
    directory: "/terraform/environments/aws-dev"
    schedule:
      interval: monthly
    target-branch: main
    open-pull-requests-limit: 3
    reviewers:
      - ivanprytula
    assignees:
      - ivanprytula
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    groups:
      terraform-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: terraform
    directory: "/terraform/environments/azure-dev"
    schedule:
      interval: monthly
    target-branch: main
    open-pull-requests-limit: 3
    reviewers:
      - ivanprytula
    assignees:
      - ivanprytula
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    groups:
      terraform-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: terraform
    directory: "/terraform/environments/aws-sandbox"
    schedule:
      interval: monthly
    target-branch: main
    open-pull-requests-limit: 3
    reviewers:
      - ivanprytula
    assignees:
      - ivanprytula
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    groups:
      terraform-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: terraform
    directory: "/terraform/environments/azure-sandbox"
    schedule:
      interval: monthly
    target-branch: main
    open-pull-requests-limit: 3
    reviewers:
      - ivanprytula
    assignees:
      - ivanprytula
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    groups:
      terraform-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions updates (pins action refs to full commit SHAs)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: wednesday
      time: "03:00"  # 3 AM UTC
      timezone: "UTC"
    target-branch: main
    open-pull-requests-limit: 5
    reviewers:
      - ivanprytula
    assignees:
      - ivanprytula
    labels:
      - dependencies
    commit-message:
      prefix: "chore(actions): update"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
