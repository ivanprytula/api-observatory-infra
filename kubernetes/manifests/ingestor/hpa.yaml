apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestor
  namespace: data-zoo
  labels:
    app.kubernetes.io/name: ingestor
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestor
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
