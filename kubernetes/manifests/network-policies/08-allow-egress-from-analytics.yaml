apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-from-analytics
  namespace: data-zoo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: analytics
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 5432
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
